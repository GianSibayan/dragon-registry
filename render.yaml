services:
  - type: web
    name: dragon-registry
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python blogapi/manage.py migrate && gunicorn blogapi.wsgi --chdir blogapi"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.13.1
      - key: DATABASE_URL
        fromDatabase:
          name: dragon-db
          property: connectionString

databases:
  - name: dragon-db
    databaseName: apidb
    user: root